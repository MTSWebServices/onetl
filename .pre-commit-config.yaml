repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-ast
        priority: 0
      - id: check-case-conflict
        priority: 0
      - id: check-docstring-first
        priority: 0
      - id: check-executables-have-shebangs
        priority: 0
      - id: check-merge-conflict
        priority: 0
      - id: check-toml
        priority: 0
      - id: check-vcs-permalinks
        priority: 0
      - id: check-yaml
        args: [--unsafe]
        priority: 0
      - id: name-tests-test
        files: ^tests/(tests_integration|tests_unit)/.*\.py$
        args: [--django]
        priority: 0
      - id: end-of-file-fixer
        exclude: ^(.*/VERSION|tests/resources/.*/.*)$
        priority: 1
      - id: fix-byte-order-marker
        priority: 2
      - id: trailing-whitespace
        priority: 3

  - repo: https://github.com/IamTheFij/docker-pre-commit
    rev: v3.0.1
    hooks:
      - id: docker-compose-check
        priority: 0

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-no-log-warn
        priority: 0
      - id: python-no-eval
        priority: 0
      - id: rst-backticks
        priority: 0
      - id: rst-directive-colons
        priority: 0
      - id: rst-inline-touching-normal
        priority: 0
      - id: text-unicode-replacement-char
        priority: 0

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: forbid-tabs
        priority: 0
      - id: remove-tabs
        args: [--whitespaces-count, '2']
        priority: 4
      - id: chmod
        args: ['644']
        exclude_types: [shell]
        exclude: ^(tests/resources/file_df_connection/generate_files\.py)$
        priority: 5
      - id: chmod
        args: ['755']
        types: [shell]
        priority: 5
      - id: chmod
        args: ['755']
        files: ^(tests/resources/file_df_connection/generate_files\.py)$
        priority: 5
      - id: insert-license
        files: .*\.py$
        exclude: ^(setup\.py|conftest\.py|docs/.*\.py|tests/.*\.py)$
        args:
          - --license-filepath
          - .spdx-license-header.txt
          - --allow-past-years
          - --no-extra-eol
        priority: 6

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: [-w]
        priority: 7

  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.15.0
    hooks:
      - id: pretty-format-yaml
        args: [--autofix, --indent, '2', --preserve-quotes, --offset, '2']
        priority: 8

  - repo: https://github.com/lovesegfault/beautysh
    rev: v6.4.2
    hooks:
      - id: beautysh
        additional_dependencies: [setuptools]
        priority: 8

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.9.18
    hooks:
      - id: uv-lock
        priority: 8

  - repo: https://github.com/pycqa/isort
    rev: 7.0.0
    hooks:
      - id: isort
        priority: 8

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py37-plus, --keep-runtime-typing]
        priority: 9

  - repo: https://github.com/asottile/add-trailing-comma
    rev: v4.0.0
    hooks:
      - id: add-trailing-comma
        priority: 10

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 25.12.0
    hooks:
      - id: black
        language_version: python3
        priority: 11

  - repo: https://github.com/asottile/blacken-docs
    rev: 1.20.0
    hooks:
      - id: blacken-docs
        additional_dependencies:
          - black==25.1.0
        priority: 11

  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        args:
          - --in-place
          - --config=setup.cfg
        priority: 11

  - repo: https://github.com/pycqa/bandit
    rev: 1.9.2
    hooks:
      - id: bandit
        args:
          - --aggregate=file
          - -iii
          - -ll
        require_serial: true
        priority: 12

  - repo: local
    hooks:
      - id: flake8
        name: flake8
        entry: python3 -m flake8
        language: system
        types: [python]
        files: ^(onetl|tests)/.*$
        pass_filenames: true
        priority: 12
      - id: mypy
        name: mypy
        entry: python3 -m mypy --config-file setup.cfg onetl
        language: system
        types: [python]
        pass_filenames: false
        priority: 12
      - id: towncrier
        name: towncrier
        entry: towncrier build --draft
        language: system
        types: [rst]
        pass_filenames: false
        priority: 12

  - repo: meta
    hooks:
      - id: check-hooks-apply
        priority: 0
      - id: check-useless-excludes
        priority: 0

ci:
  skip:
    - chmod # failing in pre-commit.ci
    - docker-compose-check # cannot run on pre-commit.ci
    - flake8 # checked with Github Actions
    - mypy # checked with Github Actions
    - towncrier # checked with Github Actions
