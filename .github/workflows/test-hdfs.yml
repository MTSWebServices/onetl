name: Tests for HDFS
on:
  workflow_call:
    inputs:
      hadoop-version:
        required: true
        type: string
      spark-version:
        required: true
        type: string
      pydantic-version:
        required: true
        type: string
      java-version:
        required: true
        type: string
      python-version:
        required: true
        type: string
      os:
        required: true
        type: string
      with-cache:
        required: false
        type: boolean
        default: true

jobs:
  test-hdfs:
    name: Run HDFS tests (server=${{ inputs.hadoop-version }}, spark=${{ inputs.spark-version }}, pydantic=${{ inputs.pydantic-version }}, java=${{ inputs.java-version }}, python=${{ inputs.python-version }}, os=${{ inputs.os }})
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Start HDFS
        run: |
          docker compose --profile all down -v --remove-orphans
          docker compose --profile hdfs up -d --pull always
        env:
          HDFS_IMAGE: mtsrus/hadoop:${{ inputs.hadoop-version }}

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up Kerberos libs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libkrb5-dev gcc

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: 'true'
          enable-cache: 'false'

      # astral-sh/setup-uv cannot restore multiple keys
      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-spark${{ inputs.spark-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-spark${{ inputs.spark-version }}-${{ hashFiles('uv.lock') }}
            ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-spark${{ inputs.spark-version }}-
            ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-
            ${{ runner.os }}-python${{ inputs.python-version }}-

      - name: Wait for HDFS to be ready
        run: |
          docker compose --profile hdfs up -d --wait --wait-timeout 200
        env:
          HDFS_IMAGE: mtsrus/hadoop:${{ inputs.hadoop-version }}

      - name: Run tests
        run: |
          mkdir reports/ || echo "Directory exists"
          echo "127.0.0.1 hdfs" | sudo tee -a /etc/hosts
          export "PYTEST=coverage run -m pytest --junitxml=reports/junit/hdfs-${RANDOM}.xml"
          make test-spark UV_ARGS="--extra hdfs --extra kerberos" PYTEST_ARGS="-n logical -m hdfs"
        env:
          PYDANTIC_VERSION: ${{ inputs.pydantic-version }}
          SPARK_VERSION: ${{ inputs.spark-version }}

      - name: Dump HDFS logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          images: mtsrus/hadoop
          dest: ./logs

      - name: Upload HDFS logs
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: container-logs-hdfs-${{ inputs.hadoop-version }}-spark${{ inputs.spark-version }}
          path: logs/*

      - name: Shutdown HDFS
        if: always()
        run: |
          docker compose --profile all down -v --remove-orphans

      - name: Upload coverage results
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-hdfs-${{ inputs.hadoop-version }}-spark${{ inputs.spark-version }}-python-${{ inputs.python-version }}
          path: reports/*
          # https://github.com/actions/upload-artifact/issues/602
          include-hidden-files: true
