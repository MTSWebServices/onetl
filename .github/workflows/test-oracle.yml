name: Tests for Oracle
on:
  workflow_call:
    inputs:
      oracle-image:
        required: true
        type: string
      oracle-version:
        required: true
        type: string
      db-name:
        required: false
        type: string
        default: FREEPDB1
      spark-version:
        required: true
        type: string
      pydantic-version:
        required: true
        type: string
      java-version:
        required: true
        type: string
      python-version:
        required: true
        type: string
      os:
        required: true
        type: string
      with-cache:
        required: false
        type: boolean
        default: true

jobs:
  test-oracle:
    name: Run Oracle tests (server=${{ inputs.oracle-version }}, spark=${{ inputs.spark-version }}, pydantic=${{ inputs.pydantic-version }}, java=${{ inputs.java-version }}, python=${{ inputs.python-version }}, os=${{ inputs.os }})
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: qoomon/actions--context@v4

      - name: Start Oracle
        run: |
          docker compose --profile all down -v --remove-orphans
          docker compose --profile oracle up -d --pull always
        env:
          ORACLE_IMAGE: ${{ inputs.oracle-image }}:${{ inputs.oracle-version }}

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      # no caching of ~/.ivy2 because Clickhouse JDBC driver is just a few MB

      - name: Set up Oracle instantclient
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libaio1 || sudo apt-get install --no-install-recommends libaio1t64
          [ -f "/usr/lib/x86_64-linux-gnu/libaio.so.1t64" ] && sudo ln -s /usr/lib/x86_64-linux-gnu/libaio.so.1t64 /usr/lib/x86_64-linux-gnu/libaio.so.1
          mkdir ./tmp
          wget -P ./tmp https://download.oracle.com/otn_software/linux/instantclient/2110000/instantclient-basic-linux.x64-21.10.0.0.0dbru.zip
          mkdir -p ./oracle
          unzip ./tmp/instantclient-basic-linux.x64-21.10.0.0.0dbru.zip -d ./oracle
          rm -rf ./tmp/instantclient-basic-linux.x64-21.10.0.0.0dbru.zip

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: "true"
          enable-cache: "false"

      # astral-sh/setup-uv cannot restore multiple keys
      - name: Cache uv
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-spark${{ inputs.spark-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-spark${{ inputs.spark-version }}-${{ hashFiles('uv.lock') }}
            ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-spark${{ inputs.spark-version }}-
            ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-
            ${{ runner.os }}-python${{ inputs.python-version }}-

      - name: Wait for Oracle to be ready
        run: |
          docker compose --profile oracle up -d --wait --wait-timeout 200
        env:
          ORACLE_IMAGE: ${{ inputs.oracle-image }}:${{ inputs.oracle-version }}

      - name: Run tests
        run: |
          export LD_LIBRARY_PATH=${ONETL_ORA_CLIENT_PATH}:${LD_LIBRARY_PATH}
          export PATH=${ONETL_ORA_CLIENT_PATH}:${PATH}

          mkdir reports/ || echo "Directory exists"
          make test-spark UV_ARGS="--group test-oracle" PYTEST_ARGS="-m oracle"
        env:
          ONETL_ORA_CLIENT_PATH: ./oracle/instantclient_21_10
          ONETL_ORA_SERVICE_NAME: ${{ inputs.db-name }}"
          PYDANTIC_VERSION: ${{ inputs.pydantic-version }}
          SPARK_VERSION: ${{ inputs.spark-version }}

      - name: Dump Oracle logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          images: ${{ inputs.oracle-image }}
          dest: ./logs

      - name: Upload Oracle logs
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: container-logs-oracle-${{ inputs.oracle-version }}-spark${{ inputs.spark-version }}
          path: logs/*

      - name: Shutdown Oracle
        if: always()
        run: |
          docker compose --profile all down -v --remove-orphans

      - name: Upload coverage results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-oracle-${{ inputs.oracle-version }}-spark${{ inputs.spark-version }}
          path: reports/*
          # https://github.com/actions/upload-artifact/issues/602
          include-hidden-files: true
