name: Tests for MSSQL
on:
  workflow_call:
    inputs:
      mssql-version:
        required: true
        type: string
      spark-version:
        required: true
        type: string
      pydantic-version:
        required: true
        type: string
      java-version:
        required: true
        type: string
      python-version:
        required: true
        type: string
      os:
        required: true
        type: string
      with-cache:
        required: false
        type: boolean
        default: true

jobs:
  test-mssql:
    name: Run MSSQL tests (server=${{ inputs.mssql-version }}, spark=${{ inputs.spark-version }}, pydantic=${{ inputs.pydantic-version }}, java=${{ inputs.java-version }}, python=${{ inputs.python-version }}, os=${{ inputs.os }})
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start MSSQL
        run: |
          docker compose --profile all down -v --remove-orphans
          docker compose --profile mssql up -d --pull always
        env:
          MSSQL_IMAGE: mcr.microsoft.com/mssql/server:${{ inputs.mssql-version }}

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      # https://github.com/pymssql/pymssql/issues/372#issuecomment-742386160
      - name: Add missing sqlfont.h file
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends freetds-dev libkrb5-dev gcc

      # no caching of ~/.ivy2 because MSSQL JDBC driver is just a few MB

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: "true"
          enable-cache: "false"

      # astral-sh/setup-uv cannot restore multiple keys
      - name: Cache uv
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-spark${{ inputs.spark-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-spark${{ inputs.spark-version }}-${{ hashFiles('uv.lock') }}
            ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-spark${{ inputs.spark-version }}-
            ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-
            ${{ runner.os }}-python${{ inputs.python-version }}-

      - name: Wait for MSSQL to be ready
        run: |
          docker compose --profile mssql up -d --wait --wait-timeout 200
        env:
          MSSQL_IMAGE: mcr.microsoft.com/mssql/server:${{ inputs.mssql-version }}

      - name: Run tests
        run: |
          mkdir reports/ || echo "Directory exists"
          export PYTEST=coverage run -m pytest
          make test-spark UV_ARGS="--group test-mssql" PYTEST_ARGS="-m mssql"
        env:
          PYDANTIC_VERSION: ${{ inputs.pydantic-version }}
          SPARK_VERSION: ${{ inputs.spark-version }}

      - name: Dump MSSQL logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          images: mcr.microsoft.com/mssql/server
          dest: ./logs

      - name: Upload MSSQL logs
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: container-logs-mssql-${{ inputs.mssql-version }}-spark${{ inputs.spark-version }}
          path: logs/*

      - name: Shutdown MSSQL
        if: always()
        run: |
          docker compose --profile all down -v --remove-orphans

      - name: Upload coverage results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-mssql-${{ inputs.mssql-version }}-spark${{ inputs.spark-version }}
          path: reports/*
          # https://github.com/actions/upload-artifact/issues/602
          include-hidden-files: true
