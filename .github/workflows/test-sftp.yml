name: Tests for SFTP
on:
  workflow_call:
    inputs:
      openssh-version:
        required: true
        type: string
      pydantic-version:
        required: true
        type: string
      python-version:
        required: true
        type: string
      os:
        required: true
        type: string
      with-cache:
        required: false
        type: boolean
        default: true

jobs:
  test-sftp:
    name: Run SFTP tests (server=${{ inputs.openssh-version }}, pydantic=${{ inputs.pydantic-version }}, python=${{ inputs.python-version }}, os=${{ inputs.os }})
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start SFTP
        run: |
          docker compose --profile all down -v --remove-orphans
          docker compose --profile sftp up -d --pull always
        env:
          SFTP_IMAGE: linuxserver/openssh-server:${{ inputs.openssh-version }}

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: "true"
          enable-cache: "false"

      # no uv cache here because fresh install takes about 1 second

      - name: Wait for SFTP to be ready
        run: |
          docker compose --profile sftp up -d --wait --wait-timeout 200
        env:
          SFTP_IMAGE: linuxserver/openssh-server:${{ inputs.openssh-version }}

      - name: Run tests
        run: |
          mkdir reports/ || echo "Directory exists"
          export "PYTEST=coverage run -m pytest --junitxml=reports/junit/sftp-${RANDOM}.xml"
          make test-no-spark UV_ARGS="--extra sftp" PYTEST_ARGS="-m sftp"
        env:
          PYDANTIC_VERSION: ${{ inputs.pydantic-version }}

      - name: Dump SFTP logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          images: linuxserver/openssh-server
          dest: ./logs

      - name: Upload SFTP logs
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: container-logs-sftp-${{ inputs.openssh-version }}-python-${{ inputs.python-version }}
          path: logs/*

      - name: Shutdown SFTP
        if: always()
        run: |
          docker compose --profile all down -v --remove-orphans

      - name: Upload coverage results
        if: success() || failure()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-sftp-${{ inputs.openssh-version }}-python-${{ inputs.python-version }}
          path: reports/*
          # https://github.com/actions/upload-artifact/issues/602
          include-hidden-files: true
