name: Tests for WebDAV
on:
  workflow_call:
    inputs:
      webdav-version:
        required: true
        type: string
      pydantic-version:
        required: true
        type: string
      python-version:
        required: true
        type: string
      os:
        required: true
        type: string
      with-cache:
        required: false
        type: boolean
        default: true

jobs:
  test-webdav:
    name: Run WebDAV tests (server=${{ inputs.webdav-version }}, pydantic=${{ inputs.pydantic-version }}, python=${{ inputs.python-version }}, os=${{ inputs.os }})
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start WebDAV
        run: |
          docker compose --profile all down -v --remove-orphans
          docker compose --profile webdav up -d --pull always
        env:
          WEBDAV_IMAGE: chonjay21/webdav:${{ inputs.webdav-version }}

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up lxml libs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libxml2-dev libxslt-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: "true"
          enable-cache: "false"

      # no uv cache here because fresh install takes about 1 second

      - name: Wait for WebDAV to be ready
        run: |
          docker compose --profile webdav up -d --wait --wait-timeout 200
        env:
          WEBDAV_IMAGE: chonjay21/webdav:${{ inputs.webdav-version }}

      - name: Run tests
        run: |
          mkdir reports/ || echo "Directory exists"
          make test-no-spark UV_ARGS="--extra webdav" PYTEST_ARGS="-m webdav"
        env:
          PYDANTIC_VERSION: ${{ inputs.pydantic-version }}

      - name: Dump WebDAV logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          images: chonjay21/webdav
          dest: ./logs

      - name: Upload WebDAV logs
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: container-logs-webdav-${{ inputs.webdav-version }}-python-${{ inputs.python-version }}
          path: logs/*

      - name: Shutdown WebDAV
        if: always()
        run: |
          docker compose --profile all down -v --remove-orphans

      - name: Upload coverage results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-webdav-${{ inputs.webdav-version }}-python-${{ inputs.python-version }}
          path: reports/*
          # https://github.com/actions/upload-artifact/issues/602
          include-hidden-files: true
