name: Tests for S3
on:
  workflow_call:
    inputs:
      minio-version:
        required: true
        type: string
      spark-version:
        required: true
        type: string
      pydantic-version:
        required: true
        type: string
      java-version:
        required: true
        type: string
      python-version:
        required: true
        type: string
      os:
        required: true
        type: string
      with-cache:
        required: false
        type: boolean
        default: true

jobs:
  test-s3:
    name: Run S3 tests (server=${{ inputs.minio-version }}, spark=${{ inputs.spark-version }}, pydantic=${{ inputs.pydantic-version }}, java=${{ inputs.java-version }}, python=${{ inputs.python-version }}, os=${{ inputs.os }})
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start S3
        run: |  # s3 & iceberg-rest combined due to parallel workflows limit
          docker compose --profile all down -v --remove-orphans
          docker compose --profile iceberg up -d --pull always
        env:
          S3_IMAGE: bitnamilegacy/minio:${{ inputs.minio-version }}

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache Ivy
        uses: actions/cache@v5
        if: inputs.with-cache
        with:
          path: ~/.ivy2
          key: ${{ runner.os }}-ivy-spark${{ inputs.spark-version }}-s3-${{ hashFiles('onetl/connection/db_connection/*.py', 'onetl/connection/file_df_connection/*.py') }}
          restore-keys: |
            ${{ runner.os }}-ivy-spark${{ inputs.spark-version }}-s3-${{ hashFiles('onetl/connection/db_connection/*.py', 'onetl/connection/file_df_connection/*.py') }}
            ${{ runner.os }}-ivy-spark${{ inputs.spark-version }}-s3-

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: "true"
          enable-cache: "false"

      # astral-sh/setup-uv cannot restore multiple keys
      - name: Cache uv
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-spark${{ inputs.spark-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-spark${{ inputs.spark-version }}-${{ hashFiles('uv.lock') }}
            ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-spark${{ inputs.spark-version }}-
            ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-
            ${{ runner.os }}-python${{ inputs.python-version }}-

      - name: Wait for S3 to be ready
        run: |
          docker compose --profile iceberg up -d --wait --wait-timeout 200
        env:
          S3_IMAGE: bitnamilegacy/minio:${{ inputs.minio-version }}

      - name: Run tests
        run: |
          mkdir reports/ || echo "Directory exists"
          make test-spark UV_ARGS="--extra s3" PYTEST_ARGS="-n logical -m s3"
        env:
          PYDANTIC_VERSION: ${{ inputs.pydantic-version }}
          SPARK_VERSION: ${{ inputs.spark-version }}

      - name: Dump S3 logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          images: bitnamilegacy/minio
          dest: ./logs

      - name: Upload S3 logs
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: container-logs-s3-${{ inputs.minio-version }}-spark${{ inputs.spark-version }}
          path: logs/*

      - name: Shutdown S3
        if: always()
        run: |
          docker compose --profile all down -v --remove-orphans

      - name: Upload coverage results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-s3-${{ inputs.minio-version }}-spark${{ inputs.spark-version }}
          path: reports/*
          # https://github.com/actions/upload-artifact/issues/602
          include-hidden-files: true
