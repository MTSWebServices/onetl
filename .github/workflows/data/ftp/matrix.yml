min: &min
  pydantic-version: 1
  python-version: "3.7"
  os: ubuntu-22.04

max: &max
  pydantic-version: 2
  python-version: "3.14"
  os: ubuntu-latest

matrix:
  small:
    # chonjay21/ftps image has only latest tag
    - ftp-version: latest
      <<: *max
  full:
    - ftp-version: latest
      <<: *min
    - ftp-version: latest
      <<: *max
