min: &min
  pydantic-version: 1
  python-version: "3.7"
  os: ubuntu-22.04

max: &max
  pydantic-version: 2
  # pydantic v1 fails with `TypeError: cannot pickle 'cell' object` on FTPS, but not on FTP`
  python-version: "3.13"
  os: ubuntu-latest

matrix:
  small:
    # chonjay21/ftps image has only latest tag
    - ftps-version: latest
      <<: *max
  full:
    - ftps-version: latest
      <<: *min
    - ftps-version: latest
      <<: *max
