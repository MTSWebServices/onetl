name: Tests for Samba
on:
  workflow_call:
    inputs:
      server-version:
        required: true
        type: string
      pydantic-version:
        required: true
        type: string
      python-version:
        required: true
        type: string
      os:
        required: true
        type: string
      with-cache:
        required: false
        type: boolean
        default: true

jobs:
  test-samba:
    name: Run Samba tests (server=${{ inputs.server-version }}, pydantic=${{ inputs.pydantic-version }}, python=${{ inputs.python-version }}, os=${{ inputs.os }})
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start Samba
        run: |
          docker compose --profile all down -v --remove-orphans
          docker compose --profile samba pull
          docker compose --profile samba up -d --wait --wait-timeout 200
        env:
          SAMBA_IMAGE: elswork/samba:${{ inputs.server-version }}

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: "true"
          save-cache: false
          cache-suffix: tests-samba-pydantic-${{ inputs.pydantic-version }}
          cache-dependency-glob: |
            requirements/core.txt
            requirements/samba.txt
            requirements/tests/base.txt
            requirements/tests/pydantic-${{ inputs.pydantic-version }}.txt

      - name: Install dependencies
        run: |
          uv pip install \
            setuptools \
            -r requirements/core.txt \
            -r requirements/samba.txt \
            -r requirements/tests/base.txt \
            -r requirements/tests/pydantic-${{ inputs.pydantic-version }}.txt

      - name: Run tests
        run: |
          mkdir reports/ || echo "Directory exists"
          source .env.local
          ./pytest_runner.sh -m samba

      - name: Dump Samba logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          images: elswork/samba
          dest: ./logs

      - name: Upload Samba logs
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: container-logs-samba-${{ inputs.server-version }}-python-${{ inputs.python-version }}-os-${{ inputs.os }}
          path: logs/*

      - name: Shutdown Samba
        if: always()
        run: |
          docker compose --profile all down -v --remove-orphans

      - name: Upload coverage results
        uses: actions/upload-artifact@v6
        with:
          name: coverage-samba-${{ inputs.server-version }}-python-${{ inputs.python-version }}-os-${{ inputs.os }}
          path: reports/*
          # https://github.com/actions/upload-artifact/issues/602
          include-hidden-files: true
