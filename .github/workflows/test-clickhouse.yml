name: Tests for Clickhouse
on:
  workflow_call:
    inputs:
      clickhouse-image:
        required: true
        type: string
      clickhouse-version:
        required: true
        type: string
      spark-version:
        required: true
        type: string
      pydantic-version:
        required: true
        type: string
      java-version:
        required: true
        type: string
      python-version:
        required: true
        type: string
      os:
        required: true
        type: string
      with-cache:
        required: false
        type: boolean
        default: true

jobs:
  test-clickhouse:
    name: Run Clickhouse tests (server=${{ inputs.clickhouse-version }}, spark=${{ inputs.spark-version }}, pydantic=${{ inputs.pydantic-version }}, java=${{ inputs.java-version }}, python=${{ inputs.python-version }}, os=${{ inputs.os }})
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start Clickhouse
        run: |
          docker compose --profile all down -v --remove-orphans
          docker compose --profile clickhouse up -d --pull always
        env:
          CLICKHOUSE_IMAGE: ${{ inputs.clickhouse-image }}:${{ inputs.clickhouse-version }}

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      # no caching of ~/.ivy2 because Clickhouse JDBC driver is just a few MB

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: "true"
          enable-cache: "false"

      # astral-sh/setup-uv cannot restore multiple keys
      - name: Cache uv
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-spark${{ inputs.spark-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-spark${{ inputs.spark-version }}-${{ hashFiles('uv.lock') }}
            ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-spark${{ inputs.spark-version }}-
            ${{ runner.os }}-python${{ inputs.python-version }}-pydantic${{ inputs.pydantic-version }}-
            ${{ runner.os }}-python${{ inputs.python-version }}-

      - name: Wait for Clickhouse to be ready
        run: |
          docker compose --profile clickhouse up -d --wait --wait-timeout 200
        env:
          CLICKHOUSE_IMAGE: ${{ inputs.clickhouse-image }}:${{ inputs.clickhouse-version }}

      - name: Run tests
        run: |
          mkdir reports/ || echo "Directory exists"
          make test-spark UV_ARGS="--group test-clickhouse" PYTEST_ARGS="-m clickhouse"
        env:
          PYDANTIC_VERSION: ${{ inputs.pydantic-version }}
          SPARK_VERSION: ${{ inputs.spark-version }}

      - name: Dump Clickhouse logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          images: ${{ inputs.clickhouse-image }}
          dest: ./logs

      - name: Upload Clickhouse logs
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: container-logs-clickhouse-${{ inputs.clickhouse-version }}-spark-${{ inputs.spark-version }}
          path: logs/*

      - name: Shutdown Clickhouse
        if: always()
        run: |
          docker compose --profile all down -v --remove-orphans

      - name: Upload coverage results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-clickhouse-${{ inputs.clickhouse-version }}-spark${{ inputs.spark-version }}-python-${{ inputs.python-version }}
          path: reports/*
          # https://github.com/actions/upload-artifact/issues/602
          include-hidden-files: true
