name: Tests for Postgres
on:
  workflow_call:
    inputs:
      postgres-version:
        required: true
        type: string
      spark-version:
        required: true
        type: string
      pydantic-version:
        required: true
        type: string
      java-version:
        required: true
        type: string
      python-version:
        required: true
        type: string
      os:
        required: true
        type: string
      with-cache:
        required: false
        type: boolean
        default: true

jobs:
  test-postgres:
    name: Run Postgres tests (server=${{ inputs.postgres-version }}, spark=${{ inputs.spark-version }}, pydantic=${{ inputs.pydantic-version }}, java=${{ inputs.java-version }}, python=${{ inputs.python-version }}, os=${{ inputs.os }})
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start Postgres
        run: |
          docker compose --profile all down -v --remove-orphans
          docker compose --profile postgres pull
          docker compose --profile postgres up -d --wait --wait-timeout 200
        env:
          POSTGRES_IMAGE: postgres:${{ inputs.postgres-version }}

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      # no caching of ~/.ivy2 because Postgres JDBC driver is just a few MB

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: "true"
          enable-cache: "false"

      # astral-sh/setup-uv cannot restore multiple keys
      - name: Cache uv
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-python${{ env.DEFAULT_PYTHON }}-pydantic${{ inputs.pydantic-version }}-spark${{ inputs.spark-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python${{ env.DEFAULT_PYTHON }}-pydantic${{ inputs.pydantic-version }}-spark${{ inputs.spark-version }}-${{ hashFiles('uv.lock') }}
            ${{ runner.os }}-python${{ env.DEFAULT_PYTHON }}-pydantic${{ inputs.pydantic-version }}-spark${{ inputs.spark-version }}-
            ${{ runner.os }}-python${{ env.DEFAULT_PYTHON }}-pydantic${{ inputs.pydantic-version }}-
            ${{ runner.os }}-python${{ env.DEFAULT_PYTHON }}-

      - name: Install dependencies
        run: |
          uv sync \
            --no-install-project \
            --group test \
            --group test-postgres \
            --group test-spark-${{ inputs.spark-version }} \
            --group test-pydantic-${{ inputs.pydantic-version }}

      - name: Run tests
        run: |
          mkdir reports/ || echo "Directory exists"
          source .env.local
          ./pytest_runner.sh -m postgres

      - name: Run tests with PGBouncer
        run: |
          mkdir reports/ || echo "Directory exists"
          source .env.local
          export ONETL_PG_PORT=6432
          # Run only some basic tests
          ./pytest_runner.sh -m postgres -k "tests_core_integration or tests_db_connection_integration"

      - name: Dump Postgres logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          images: postgres,bitnamilegacy/pgbouncer
          dest: ./logs

      - name: Upload Postgres logs
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: container-logs-postgres-${{ inputs.postgres-version }}-spark${{ inputs.spark-version }}-python-${{ inputs.python-version }}-os-${{ inputs.os }}
          path: logs/*

      - name: Shutdown Postgres
        if: always()
        run: |
          docker compose --profile all down -v --remove-orphans

      - name: Upload coverage results
        uses: actions/upload-artifact@v6
        with:
          name: coverage-postgres-${{ inputs.postgres-version }}-spark${{ inputs.spark-version }}-python-${{ inputs.python-version }}-os-${{ inputs.os }}
          path: reports/*
          # https://github.com/actions/upload-artifact/issues/602
          include-hidden-files: true
