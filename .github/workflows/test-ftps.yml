name: Tests for FTPS
on:
  workflow_call:
    inputs:
      ftps-version:
        required: true
        type: string
      pydantic-version:
        required: true
        type: string
      python-version:
        required: true
        type: string
      os:
        required: true
        type: string
      with-cache:
        required: false
        type: boolean
        default: true

jobs:
  test-ftps:
    name: Run FTPS tests (server=${{ inputs.ftps-version }}, pydantic=${{ inputs.pydantic-version }}, python=${{ inputs.python-version }}, os=${{ inputs.os }})
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start FTPS
        run: |
          docker compose --profile all down -v --remove-orphans
          docker compose --profile ftps up -d --pull always
        env:
          FTPS_IMAGE: chonjay21/ftps:${{ inputs.ftps-version }}

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: 'true'
          enable-cache: 'false'

      # no uv cache here because fresh install takes about 1 second

      - name: Wait for FTPS to be ready
        run: |
          docker compose --profile ftps up -d --wait --wait-timeout 200
        env:
          FTPS_IMAGE: chonjay21/ftps:${{ inputs.ftps-version }}

      - name: Run tests
        run: |
          mkdir reports/ || echo "Directory exists"
          export "PYTEST=coverage run -m pytest --junitxml=reports/junit/ftps-${RANDOM}.xml"
          make test-no-spark UV_ARGS="--extra ftps" PYTEST_ARGS="-m ftps"
        env:
          PYDANTIC_VERSION: ${{ inputs.pydantic-version }}

      - name: Dump FTPS logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
        with:
          images: chonjay21/ftps
          dest: ./logs

      - name: Upload FTPS logs
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: container-logs-ftps-${{ inputs.ftps-version }}-python-${{ inputs.python-version }}
          path: logs/*

      - name: Shutdown FTPS
        if: always()
        run: |
          docker compose --profile all down -v --remove-orphans

      - name: Upload coverage results
        if: success() || failure()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-ftps-${{ inputs.ftps-version }}-python-${{ inputs.python-version }}
          path: reports/*
          # https://github.com/actions/upload-artifact/issues/602
          include-hidden-files: true
