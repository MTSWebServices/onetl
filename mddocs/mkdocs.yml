site_name: onETL Docs
site_url: !ENV READTHEDOCS_CANONICAL_URL
docs_dir: docs                             # Where to find the English markdown files
site_dir: generated                        # Where to put the English HTML files

theme:
  name: material
  logo: _static/images/logo.svg                      # The logo is shared by all languages
  favicon: _static/images/icon.svg                   # The favicon is shared by all languages
  language: en
  features:
    - navigation.indexes
    - content.tabs.link
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  locale: en
  highlightjs: true
  hljs_languages:
    - yaml

extra_css:
  - _static/stylesheets/mermaid_zoom.css
  - _static/stylesheets/autodoc_pydantic.css

extra_javascript:
  - _static/javascripts/mermaid_zoom.js

plugins:
  - search
  - autorefs
  - literate-nav:
      nav_file: nav.md
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [..]
          options:
            show_source: false
            show_root_heading: false
            show_root_toc_entry: false
            show_root_full_path: false
            heading_level: 3
            docstring_style: numpy
            docstring_section_style: list
            inherited_members: true
            extensions:
              - scripts/griffe_expand_refs.py:ExpandShortRefs
              - griffe_inherited_docstrings
            # - griffe_pydantic: {schema: false}
  # - i18n:
  #     docs_structure: folder
  #     languages:
  #       - locale: en
  #         default: true
  #         name: English
  #         build: true
  #       - locale: ru
  #         name: Русский
  #         build: false
  - towncrier

markdown_extensions:
  - footnotes
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.snippets:
      base_path: .
      check_paths: true
  - toc:
      permalink: true
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
